# user-authored Codex config
model = "gpt-5.4"
approval_policy = "on-request"

# BEGIN desk activation: desk@1.7.3 mode=manual-only owner=desk-activation
[desk.activation]
id = "desk"
version = "1.7.3"
mode = "manual-only"
scope = "global"
desk_root = "~/desk"
runtime_cache_dir = "~/.cache/ouroboros-skills/desk"
default_agent = ""
mcp_auto_start = false
manual_only = true
project_local = false

[desk.activation.dependencies.work-suite]
path = "plugins/work-suite"
version = "1.4.9"
resolution = "flattened"

[desk.activation.mcp_servers.desk]
transport = "stdio"
command = "node"
args = ["plugins/desk/mcp/index.js"]
manual_registration = false

[desk.activation.agents.worker]
id = "desk:worker"
source = "plugins/desk/agents/worker.toml"
copy_to_host = false
default = false

[desk.activation.permissions]
requested_capabilities = ["Read", "Write", "Interactive"]
generated_artifacts = ["owned-host-config", "activation-ledger"]
never_delete = ["desk-root-data"]

[desk.activation.opt_out]
project_local = true
manual_only = true
# END desk activation
