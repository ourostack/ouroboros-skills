name: Validate skills

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate skills
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate skill repository
        run: node scripts/validate-skills.cjs
