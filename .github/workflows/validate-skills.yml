name: Validate skills

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate skills
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: plugins/desk/mcp/package-lock.json

      - name: Install Desk MCP dependencies
        working-directory: plugins/desk/mcp
        run: npm ci

      - name: Validate skill repository
        run: node scripts/validate-skills.cjs

      - name: Validate Desk healthy-path docs
        run: node scripts/test-desk-docs.cjs
