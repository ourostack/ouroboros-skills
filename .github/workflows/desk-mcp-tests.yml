name: desk MCP tests

# Runs the desk MCP server test suite through the coverage gate
# (plugins/desk/mcp `npm run test:coverage`).
# Skill-manifest validation lives in validate-skills.yml and does NOT exercise
# the MCP code, so without this job desk-core changes can merge untested.
# Path-filtered to the MCP package, root validation scripts, and this workflow
# file to keep unrelated skill/docs edits from triggering a Node build they
# don't need.

on:
  pull_request:
    paths:
      - "plugins/desk/mcp/**"
      - "plugins/desk/activation/**"
      - "plugins/desk/.claude-plugin/plugin.json"
      - "plugins/desk/.codex-plugin/plugin.json"
      - "plugins/desk/.mcp.json"
      - "plugins/desk/agents/**"
      - "plugins/desk/hooks/**"
      - "plugins/desk/output-styles/**"
      - "plugins/desk/plugin.json"
      - "plugins/desk/skills/**"
      - "plugins/work-suite/.claude-plugin/plugin.json"
      - "plugins/work-suite/.codex-plugin/plugin.json"
      - "plugins/work-suite/plugin.json"
      - "plugins/work-suite/skills/**"
      - "plugins/desk/mcp/artifacts/runtime-deps/**"
      - "plugins/desk/artifacts/vector-packs/**"
      - "plugins/desk/artifacts/snapshots/**"
      - "plugins/desk/artifacts/tombstones/**"
      - "plugins/desk/artifacts/publication-policy.json"
      - "plugins/desk/artifacts/publication-policy.schema.json"
      - "plugins/desk/README.md"
      - "plugins/desk/docs/**"
      - "plugins/desk/mcp/README.md"
      - "plugins/desk/activation/README.md"
      - "plugins/desk/mcp/config/performance-budgets.json"
      - "plugins/desk/mcp/scripts/build-runtime-deps-pack.js"
      - "plugins/desk/mcp/scripts/verify-runtime-deps-pack.js"
      - "plugins/desk/mcp/scripts/build-vector-pack.js"
      - "plugins/desk/mcp/scripts/build-snapshot.js"
      - "plugins/desk/mcp/scripts/verify-snapshot.js"
      - "plugins/desk/mcp/scripts/validate-artifacts.js"
      - "desk/tasks/2026-06-14-1335-planning-desk-dependency-activation.md"
      - "scripts/*.cjs"
      - "scripts/test-desk-docs.cjs"
      - ".github/workflows/desk-mcp-tests.yml"
  push:
    branches:
      - main
    paths:
      - "plugins/desk/mcp/**"
      - "plugins/desk/activation/**"
      - "plugins/desk/.claude-plugin/plugin.json"
      - "plugins/desk/.codex-plugin/plugin.json"
      - "plugins/desk/.mcp.json"
      - "plugins/desk/agents/**"
      - "plugins/desk/hooks/**"
      - "plugins/desk/output-styles/**"
      - "plugins/desk/plugin.json"
      - "plugins/desk/skills/**"
      - "plugins/work-suite/.claude-plugin/plugin.json"
      - "plugins/work-suite/.codex-plugin/plugin.json"
      - "plugins/work-suite/plugin.json"
      - "plugins/work-suite/skills/**"
      - "plugins/desk/mcp/artifacts/runtime-deps/**"
      - "plugins/desk/artifacts/vector-packs/**"
      - "plugins/desk/artifacts/snapshots/**"
      - "plugins/desk/artifacts/tombstones/**"
      - "plugins/desk/artifacts/publication-policy.json"
      - "plugins/desk/artifacts/publication-policy.schema.json"
      - "plugins/desk/README.md"
      - "plugins/desk/docs/**"
      - "plugins/desk/mcp/README.md"
      - "plugins/desk/activation/README.md"
      - "plugins/desk/mcp/config/performance-budgets.json"
      - "plugins/desk/mcp/scripts/build-runtime-deps-pack.js"
      - "plugins/desk/mcp/scripts/verify-runtime-deps-pack.js"
      - "plugins/desk/mcp/scripts/build-vector-pack.js"
      - "plugins/desk/mcp/scripts/build-snapshot.js"
      - "plugins/desk/mcp/scripts/verify-snapshot.js"
      - "plugins/desk/mcp/scripts/validate-artifacts.js"
      - "desk/tasks/2026-06-14-1335-planning-desk-dependency-activation.md"
      - "scripts/*.cjs"
      - "scripts/test-desk-docs.cjs"
      - ".github/workflows/desk-mcp-tests.yml"

jobs:
  desk-mcp-tests:
    name: desk MCP test suite
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 22 (matches validate-skills.yml; current LTS). The test script
          # uses a `**` glob in `node --test`, which only resolves on Node >= 21,
          # so do NOT drop below 22 here even though engines floor is >= 20.
          node-version: "22"
          cache: "npm"
          cache-dependency-path: plugins/desk/mcp/package-lock.json

      - name: Install dependencies
        working-directory: plugins/desk/mcp
        run: npm ci

      - name: Run desk MCP coverage gate
        working-directory: plugins/desk/mcp
        run: npm run test:coverage

      - name: Verify committed generated artifacts
        run: node scripts/test-desk-generated-artifacts.cjs

      - name: Verify Desk host manifests
        run: node scripts/test-desk-host-manifests.cjs

      - name: Validate Desk healthy-path docs
        run: node scripts/test-desk-docs.cjs

      - name: Build runtime dependency pack
        working-directory: plugins/desk/mcp
        run: npm run runtime:deps-pack:build -- --output-root "$RUNNER_TEMP/desk-runtime-deps"

      - name: Verify runtime dependency pack
        working-directory: plugins/desk/mcp
        run: |
          manifest="$(find "$RUNNER_TEMP/desk-runtime-deps" -name runtime-deps.manifest.json -print -quit)"
          test -n "$manifest"
          npm run runtime:deps-pack:verify -- --pack-dir "$(dirname "$manifest")"

      - name: Verify Desk snapshot artifacts
        working-directory: plugins/desk/mcp
        run: npm run artifact:snapshot:verify -- --plugin-root ..

      - name: Validate Desk shared artifacts
        working-directory: plugins/desk/mcp
        run: npm run artifact:validate -- --desk-root ../../.. --plugin-root ..
